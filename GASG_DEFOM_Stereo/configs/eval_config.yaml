# ============================================================
#  Evaluation Configuration
# ============================================================

# Depth evaluation
depth:
  max_depth: 80.0       # meters
  min_depth: 0.001      # meters
  eigen_crop: true      # use Eigen crop for KITTI
  median_scaling: true  # for affine-invariant models

# Right-view synthesis evaluation
rightview:
  lpips_backbone: "alex"
  lpips_version: "0.1.4"

# Datasets
kitti:
  root: "data/kitti"
  split: "eigen"         # eigen | eigen_benchmark
  gt_depth_dir: "data/kitti/gt_depths"

person:
  root: "data/PersonDataset"
  split: "test"

# DEFOM-Stereo
defom_stereo:
  checkpoint: "checkpoints/defom_stereo.pth"
  # Download from: https://github.com/Insta360-Research-Team/DEFOM-Stereo

# FoundationStereo
foundation_stereo:
  checkpoint: "checkpoints/foundation_stereo.pth"
  # Download from: https://github.com/NVlabs/FoundationStereo

# GASG (ours)
gasg:
  checkpoint: "checkpoints/gasg_best.pth"

# Camera parameters
camera:
  focal_length: 600
  baseline: 1.0

# Output
output:
  results_dir: "results"
  save_predictions: true
  save_visualizations: true
